name: 🐞 Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I do X, Y happens, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `./run.sh`
        2. Press `a`, add "..."
        3. ...
    validations:
      required: true
  - type: input
    id: tmux-version
    attributes:
      label: tmux version
      description: Output of `tmux -V`
      placeholder: tmux 3.4
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node -v`
      placeholder: v20.11.0
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, terminal/font, `tmux-statusline doctor` output, etc.
